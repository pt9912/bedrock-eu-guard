# .d-check.yml — bedrock-eu-guard. Basis: `d-check --suggest-config ai-harness-init`
# (Voll-Kanon), ID-Schema kanonisch auf `LH-FA-<AREA>-NNN` / `LH-QA-NNN`
# gezogen (harness/conventions.md MR-002). Lauf: `make doc-check`.

scan:
  roots: ["."]                               # ganzes Repo inkl. Root-README/AGENTS (Härtung wie d-check-Self-Config)
  ignore: ["**/*.template.md", ".tmp/**"]    # co-located Templates + Scratch ausnehmen

modules: [links, anchors, ids, matrix, codepaths]

ids:
  scope:
    roots: ["."]   # ganzes Repo: ID-Linkpflicht auch in ADRs/Slices/Roadmap/README/AGENTS
  patterns:
    - regex: 'ADR-\d{4}'
      target: docs/plan/adr/
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
    - regex: 'MR-\d{3}'
      target: harness/conventions.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
    # Anforderungen (Kanon: nur FA/QA werden von --trace als Requirement gezählt)
    - regex: 'LH-(FA-[A-Z]+|QA)-\d+'
      target: spec/lastenheft.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
    # Alle weiteren LH-Kategorien (NF, SEC + Kontext: AUSG/ZIEL/NZ/BEG/KONT/
    # MOD/BSP/PRI/ABN/RISK/OFF/RM/TECH): linkpflichtig, aber keine
    # --trace-Requirements — nur FA/QA zählen (Pattern oben hat Präzedenz).
    - regex: 'LH-[A-Z]+(?:-[A-Z]+)?-\d{3}'
      target: spec/lastenheft.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
    - regex: 'SPEC-\d{3}'
      target: spec/spezifikation.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
    - regex: 'ARC-\d{3}'
      target: spec/architecture.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
    - regex: 'slice-\d{3}'
      target: docs/plan/planning/
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]

matrix:
  classes:
    - {name: spec-straten, paths: [spec/lastenheft.md, spec/spezifikation.md, spec/architecture.md]}
    - {name: adr, paths: ["docs/plan/adr/[0-9]*.md"]}
    - {name: slice, paths: ["docs/plan/planning/**/slice-*.md"]}
  rules:
    - {from: spec-straten, to: adr, allow: false}
    - {from: spec-straten, to: slice, allow: false}
  status:
    forbidden: [superseded, deprecated]
  exclude-sections: [Historie, "7. Historie", Geschichte, "20. Historie"]

codepaths:
  exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
